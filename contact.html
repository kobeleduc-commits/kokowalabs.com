<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in Touch – Kokowa Field Labs</title>
  <!--
    The contact page invites founders to start a conversation. Update the meta tags to
    reflect Kokowa Field Labs’ identity and ensure social previews display correctly.
  -->
  <meta name="description" content="Reach out to Kokowa Field Labs to discuss how we can help you build a stronger specialty coffee or premium F&B venture." />
  <meta property="og:title" content="Get in Touch – Kokowa Field Labs" />
  <meta property="og:description" content="Contact us to explore a Diagnostic Intensive, Launch Sprint or Ongoing Advisory for your specialty coffee or premium F&B venture." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.kokowalabs.com/contact.html" />
  <meta property="og:image" content="https://www.kokowalabs.com/img/og-image.jpg" />
  <link rel="canonical" href="https://www.kokowalabs.com/contact.html" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <!-- Header / Navigation -->
  <header>
    <div class="container nav">
      <!-- Logo with image and brand name -->
      <a href="index.html" class="logo">
        <img src="img/logo.png" alt="Kokowa Field Labs Logo" class="logo-img">
      </a>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Offering</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
  </header>

  <section style="background: linear-gradient(180deg, #FFFFFF 0%, #F3F4F6 100%); padding: 4rem 0; text-align: center;">
    <div class="container">
      <h1>Start the Conversation</h1>
      <p class="section-subtitle">Let’s explore how to accelerate your launch and build a future‑proof business</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="contact-info">
        <div>
        <strong>Email:</strong> <a href="mailto:kobe@kokowalabs.com">kobe@kokowalabs.com</a>
        </div>
        <div>
        <strong>Phone:</strong> <a href="tel:+32468488464">+32&nbsp;468&nbsp;48&nbsp;84&nbsp;64</a>
        </div>
        <div>
          <strong>Office:</strong> Brussels, Belgium
        </div>
      </div>
      <div class="contact-form">
        <!-- Replace the Formspree URL with your own form ID or integrate a different form provider -->
        <form action="https://formspree.io/f/your-form-id" method="POST">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>

          <button type="submit" class="btn" style="border: none;">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="services.html">Offering</a>
        <a href="contact.html">Contact</a>
      </div>
      <p>&copy; <span id="year"></span> Kokowa Field Labs. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
